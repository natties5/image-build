name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-format:
    name: Lint and Check Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt

      - name: Run ShellCheck
        run: |
          find . -type f -name '*.sh' -exec shellcheck {} +

      - name: Check Shell Format (shfmt)
        run: |
          find . -type f -name '*.sh' -exec shfmt -d -i 2 -ci {} +

      - name: Validate Start/Preflight execution (mocked)
        run: |
          # Ensure scripts can at least be parsed and run up to validation checks
          # without exploding on missing runtime dirs.
          bash bin/imagectl.sh preflight || echo "Expected to fail on missing openstack credentials, but should not fail on missing paths."
